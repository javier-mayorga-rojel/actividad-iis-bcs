function scSec(an,ch){
  let mc=0,tf=0,fr=0;
  (an.mc||[]).forEach((a,i)=>{if(i<ch.mc.length&&a===ch.mc[i].ans)mc++;});
  (an.tf||[]).forEach((a,i)=>{if(i<ch.tf.length&&a===ch.tf[i].ans)tf++;});
  (an.frag||[]).forEach((a,i)=>{if(i<ch.frags.length&&a===ch.frags[i].ok)fr++;});
  return{mc,tf,fr,t:mc+tf+fr,mmc:ch.mc.length,mtf:ch.tf.length,mfr:ch.frags.length,max:ch.mc.length+ch.tf.length+ch.frags.length};
}
function scTot(an){let t=0,m=0;CHARS.forEach((c,i)=>{const s=scSec(an[i]||{},c);t+=s.t;m+=s.max;});return{t,m,pct:m>0?Math.round(t/m*100):0};}

  if(isCorr){bg="#d1fae5";bdr="#1a5c38";col="#1a5c38";fw=700;}
  if(isChosen&&!isCorr){bg="#fee2e2";bdr="#b91c1c";col="#9b2226";fw=700;}
  return`<span style="padding:5px 14px;border-radius:6px;border:.5px solid ${bdr};background:${bg};font-size:12px;color:${col};font-weight:${fw};display:inline-flex;align-items:center;gap:4px">
<i class="ti ${v?"ti-check":"ti-x"}"></i>${v?"Verdadero":"Falso"}${isCorr?" ✓":""}</span>`;}).join("")}
${chosen===undefined?`<span style="font-size:12px;color:var(--text3)">Sin respuesta.</span>`:""}
</div>
${!isRight&&q.tip?`<div class="feedback-box" style="margin-left:28px"><i class="ti ti-info-circle" style="font-size:15px;flex-shrink:0"></i><span><strong>Retroalimentación:</strong> ${q.tip}</span></div>`:""}
</div>`;}).join("")}</div>

<!-- ── Frags Review ── -->
<div class="card">
<h3 style="margin-bottom:1rem"><i class="ti ti-cards" style="font-size:15px;vertical-align:-2px;margin-right:6px"></i>Clasificación de fragmentos &nbsp;<span style="font-weight:400;font-size:13px;color:var(--text2)">${ss.fr} correctas de ${ss.mfr}</span></h3>
${ch.frags.map((f,fi)=>{
  const chosen=(an.frag||[])[fi];
  const correct=f.ok;
  const isRight=chosen===correct;
  return`<div style="padding:.85rem 1rem;border-radius:10px;margin-bottom:.75rem;border:.5px solid ${isRight?"#1a5c38":"#b91c1c"};background:${isRight?"#ebf7ef":"#fff5f5"}">
<div style="display:flex;align-items:flex-start;gap:.75rem;margin-bottom:.75rem">
<span style="flex-shrink:0;width:20px;height:20px;margin-top:1px;border-radius:50%;background:${isRight?"#1a5c38":"#b91c1c"};display:inline-flex;align-items:center;justify-content:center">
<i class="ti ${isRight?"ti-check":"ti-x"}" style="font-size:11px;color:#fff"></i></span>
<p style="font-size:13px;font-style:italic;color:var(--text);border-left:3px solid ${ch.color};padding-left:.75rem">"${f.t}"</p></div>
<div style="padding-left:28px;font-size:13px">
<span style="color:${isRight?"#1a5c38":"#b91c1c"};font-weight:600">Tu respuesta: ${chosen===true?"Sí ilustra":"No ilustra"} C${ch.num}</span>
${!isRight?` &nbsp;·&nbsp; <span style="color:#1a5c38;font-weight:600">Correcta: ${correct===true?"Sí ilustra":"No ilustra"} C${ch.num}</span>`:""}
${chosen===undefined?`<span style="color:var(--text3)">Sin respuesta.</span>`:""}
</div>
${f.tip?`<div class="feedback-box" style="margin-top:.6rem;margin-left:28px"><i class="ti ti-info-circle" style="font-size:15px;flex-shrink:0"></i><span><strong>${isRight?"¿Por qué es correcto?":"¿Por qué es incorrecto?"}</strong> ${f.tip}</span></div>`:""}
</div>`;}).join("")}</div>

<!-- Nav -->
<div style="display:flex;justify-content:space-between;margin-top:.5rem;flex-wrap:wrap;gap:.5rem">
${ci>0?`<button class="btn" onclick="S.rsi=${ci-1};render();window.scrollTo(0,0)"><i class="ti ti-arrow-left"></i> C${CHARS[ci-1].num} anterior</button>`:`<span></span>`}
${ci<CHARS.length-1
  ?`<button class="btn btn-p" onclick="S.rsi=${ci+1};render();window.scrollTo(0,0)">C${CHARS[ci+1].num} siguiente <i class="ti ti-arrow-right"></i></button>`
  :`<button class="btn btn-g" onclick="S.view='done';render();window.scrollTo(0,0)"><i class="ti ti-circle-check"></i> Ver resumen final</button>`}
</div></div></div>`;}

// ─── VISTA: PIN ───────────────────────────────────────────────────────────────
function vPin(){return`<div style="max-width:300px;margin:3rem auto;text-align:center">
<div style="width:52px;height:52px;background:#f5eef8;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem">
<i class="ti ti-lock" style="font-size:26px;color:#4a1a6b"></i></div>
<h2 style="margin-bottom:.5rem">Panel del docente</h2>
<p style="margin-bottom:1.25rem">Ingrese el PIN de acceso para ver el seguimiento</p>
<input type="password" id="pi" placeholder="PIN" style="text-align:center;font-size:18px;letter-spacing:.15em;margin-bottom:.75rem" onkeydown="if(event.key==='Enter')chkPin()">
<button class="btn btn-p" onclick="chkPin()" style="width:100%;justify-content:center;margin-top:.25rem"><i class="ti ti-login"></i> Ingresar</button>
<p id="pe" style="color:var(--danger);font-size:12px;margin-top:.75rem;display:none">PIN incorrecto.</p>
<button class="btn" onclick="goHome()" style="width:100%;justify-content:center;margin-top:.5rem"><i class="ti ti-arrow-left"></i> Volver</button></div>`;}

// ─── VISTA: DASHBOARD ─────────────────────────────────────────────────────────
function vDash(){
  const gs=S.dgs,done=gs.filter(g=>g.completed).length,tot=S.exp,pct=tot>0?Math.round(done/tot*100):0;
  const ci=S.dsi,ch=CHARS[ci];
  const mcp=ch.mc.map((_,qi)=>{const c=gs.filter(g=>g.completed&&(g.answers[ci]?.mc||[])[qi]===ch.mc[qi].ans).length;return done>0?Math.round(c/done*100):0;});
  const tfp=ch.tf.map((_,qi)=>{const c=gs.filter(g=>g.completed&&(g.answers[ci]?.tf||[])[qi]===ch.tf[qi].ans).length;return done>0?Math.round(c/done*100):0;});
  const frp=ch.frags.map((_,qi)=>{const c=gs.filter(g=>g.completed&&(g.answers[ci]?.frag||[])[qi]===ch.frags[qi].ok).length;return done>0?Math.round(c/done*100):0;});
  const wf={};ch.words.forEach(w=>wf[w]=0);
  gs.filter(g=>g.completed).forEach(g=>{((g.answers[ci]?.words)||[]).forEach(w=>{if(wf[w]!==undefined)wf[w]++;});});
  const mxf=Math.max(1,...Object.values(wf));
  return`<div class="inner" style="padding-top:1.25rem">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.5rem">
<div style="display:flex;align-items:center;gap:.75rem">
<button class="btn" onclick="goHome()"><i class="ti ti-arrow-left"></i></button>
<div><h2 style="margin-bottom:0">Panel del docente</h2><p style="font-size:12px">IIS · BCS · UFRO · Seguimiento en tiempo real</p></div></div>
<div style="display:flex;gap:8px">
<button class="btn" onclick="refDash()"><i class="ti ti-refresh"></i> Actualizar</button>
<button class="btn btn-p" onclick="expCSV()"><i class="ti ti-download"></i> CSV</button></div></div>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1rem">
<div class="metric"><div class="mlabel">Completados</div><div class="mval" style="color:#1a5c38">${done}</div></div>
<div class="metric"><div class="mlabel">Esperados <span onclick="edTot()" style="cursor:pointer;font-size:11px;color:var(--text2)" title="Editar">✎</span></div><div class="mval">${tot}</div></div>
<div class="metric"><div class="mlabel">Progreso</div><div class="mval">${pct}%</div></div></div>
${pbar(pct,"#0f2142")}
<div style="display:flex;gap:5px;margin-bottom:1.25rem;flex-wrap:wrap">
${CHARS.map((c,i)=>`<button onclick="S.dsi=${i};render()" style="padding:6px 12px;border-radius:20px;font-size:12px;border:.5px solid;cursor:pointer;font-family:var(--ff);background:${i===ci?c.color:"var(--bg2)"};color:${i===ci?"#fff":"var(--text2)"};border-color:${i===ci?c.color:"var(--bdr)"}">C${c.num}. ${c.title.split(" ").slice(0,2).join(" ")}</button>`).join("")}</div>
<div style="background:${ch.bg};border-radius:8px;padding:.75rem 1rem;margin-bottom:1.25rem;border-left:3px solid ${ch.color}"><p style="font-size:13px;font-weight:600;color:${ch.color}">C${ch.num}: ${ch.title}</p></div>

<div class="card">
<h3><i class="ti ti-cloud" style="font-size:15px;vertical-align:-2px;margin-right:6px"></i>Nube de conceptos — selecciones agregadas (n=${done})</h3>
<div style="text-align:center;padding:.75rem 0;display:flex;flex-wrap:wrap;justify-content:center;gap:8px">
${ch.words.map(w=>{const f=wf[w]||0,sz=14+Math.round(f/mxf*18),op=f===0?.2:.45+(f/mxf*.55);return`<span style="font-size:${sz}px;padding:5px 14px;border-radius:20px;background:${ch.color};opacity:${op};color:#fff;display:inline-flex;align-items:center;gap:6px">${w}<span style="font-size:${Math.max(10,sz-6)}px;background:rgba(255,255,255,.9);color:${ch.color};padding:1px 5px;border-radius:8px;font-weight:600">${f}</span></span>`;}).join("")}
</div>${done===0?'<p style="font-size:12px;text-align:center;margin-top:.5rem">Sin datos aún.</p>':""}</div>

<div class="card">
<h3><i class="ti ti-chart-bar" style="font-size:15px;vertical-align:-2px;margin-right:6px"></i>Aciertos por pregunta (n=${done})</h3>
<p style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:.5rem;margin-top:.25rem">Selección múltiple</p>
${ch.mc.map((q,i)=>`<div style="margin-bottom:.6rem"><div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--text2);max-width:83%">P${i+1}: ${q.q.substring(0,62)}${q.q.length>62?"…":""}</span><span style="font-size:12px;font-weight:600;color:${mcp[i]>=70?"#1a5c38":mcp[i]>=40?"#7b3f00":"#9b2226"}">${mcp[i]}%</span></div>${brow(mcp[i])}</div>`).join("")}
<div style="border-top:.5px solid var(--bdr);padding-top:.75rem;margin:.75rem 0"></div>
<p style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:.5rem">Verdadero o falso</p>
${ch.tf.map((q,i)=>`<div style="margin-bottom:.6rem"><div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--text2);max-width:83%">VF${i+1}: ${q.q.substring(0,62)}${q.q.length>62?"…":""}</span><span style="font-size:12px;font-weight:600;color:${tfp[i]>=70?"#1a5c38":tfp[i]>=40?"#7b3f00":"#9b2226"}">${tfp[i]}%</span></div>${brow(tfp[i])}</div>`).join("")}
<div style="border-top:.5px solid var(--bdr);padding-top:.75rem;margin:.75rem 0"></div>
<p style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:.5rem">Clasificación de fragmentos</p>
${ch.frags.map((f,i)=>`<div style="margin-bottom:.6rem"><div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:var(--text2);font-style:italic;max-width:83%">"${f.t.substring(0,58)}…"</span><span style="font-size:12px;font-weight:600;color:${frp[i]>=70?"#1a5c38":frp[i]>=40?"#7b3f00":"#9b2226"}">${frp[i]}%</span></div>${brow(frp[i])}</div>`).join("")}</div>

<div class="card">
<h3 style="margin-bottom:1rem"><i class="ti ti-users" style="font-size:15px;vertical-align:-2px;margin-right:6px"></i>Participantes registrados (${gs.length} total)</h3>
${gs.length===0?'<p style="font-size:13px">Nadie ha ingresado aún.</p>':""}
${gs.map(g=>{const s=g.completed?scTot(g.answers):null,ss=g.completed?scSec(g.answers[ci]||{},ch):null;return`<div style="padding:.75rem;border:.5px solid var(--bdr);border-radius:8px;margin-bottom:.5rem">
<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem">
<div><p style="font-size:14px;font-weight:600;color:var(--text)">${g.name}</p>
<p style="font-size:12px">${g.mode==="individual"?"Individual":`Grupo · ${(g.members||[]).filter(Boolean).join(" · ")}`}</p></div>
<div style="display:flex;align-items:center;gap:.75rem">
${g.completed?`<span style="background:#ebf7ef;color:#1a5c38;padding:3px 9px;border-radius:4px;font-size:11px;font-weight:600">✓ Listo</span><span style="font-size:13px;font-weight:600;color:var(--text)">${s.t}/${s.m} (${s.pct}%)</span>`:`<span style="background:var(--bg2);color:var(--text2);padding:3px 9px;border-radius:4px;font-size:11px">En progreso</span>`}</div></div>
${g.completed&&ss?`<div style="margin-top:.5rem;padding-top:.5rem;border-top:.5px solid var(--bdr)"><p style="font-size:11px;color:var(--text2)">C${ch.num} — SM: ${ss.mc}/${ss.mmc} · VF: ${ss.tf}/${ss.mtf} · Frag: ${ss.fr}/${ss.mfr} · <strong>Total: ${ss.t}/${ss.max}</strong></p>${g.answers[ci]?.words?.length?`<p style="font-size:11px;color:var(--text2);margin-top:2px">Palabras: ${g.answers[ci].words.join(", ")}</p>`:""}</div>`:""}</div>`;}).join("")}
</div></div>`;}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const a=document.getElementById("app");
  if(!a)return;
  if(S.view==="home")a.innerHTML=vHome();
  else if(S.view==="reg")a.innerHTML=vReg();
  else if(S.view==="sec")a.innerHTML=vSec();
  else if(S.view==="done")a.innerHTML=vDone();
  else if(S.view==="review")a.innerHTML=vReview();
  else if(S.view==="pin")a.innerHTML=vPin();
  else if(S.view==="dash")a.innerHTML=vDash();
}

// ─── ACCIONES ─────────────────────────────────────────────────────────────────
function goReview(){S.rsi=0;S.view="review";render();window.scrollTo(0,0);}
function goHome(){if(S.unwatch){S.unwatch();S.unwatch=null;}S.view="home";render();}
function goReg(){S.grp=null;S.ans=mkAns();S.si=0;S.view="reg";render();}
function goPin(){S.view="pin";render();}

function startAct(){
  const nm=document.getElementById("gn")?.value?.trim()||"";
  const err=document.getElementById("re");
  if(!nm){if(err){err.textContent="Ingrese un nombre.";err.style.display="block";}return;}
  let ms=[];
  if(S.regMode==="grupo"){
    ms=[0,1,2,3].map(i=>document.getElementById("m"+i)?.value?.trim()||"").filter(Boolean);
    if(ms.length<2){if(err){err.textContent="Ingrese al menos 2 integrantes.";err.style.display="block";}return;}
  }
  S.grp={id:Date.now()+"_"+Math.random().toString(36).substr(2,5),name:nm,mode:S.regMode,members:ms,startedAt:new Date().toISOString(),completed:false,answers:S.ans};
  S.si=0;S.view="sec";saveGrp(S.grp);render();window.scrollTo(0,0);
}
function sMC(ci,qi,oi){if(!S.ans[ci].mc)S.ans[ci].mc=[];S.ans[ci].mc[qi]=oi;if(S.grp){S.grp.answers=S.ans;saveGrp(S.grp);}render();}
function sTF(ci,qi,v){if(!S.ans[ci].tf)S.ans[ci].tf=[];S.ans[ci].tf[qi]=v;if(S.grp){S.grp.answers=S.ans;saveGrp(S.grp);}render();}
function sFR(ci,fi,v){if(!S.ans[ci].frag)S.ans[ci].frag=[];S.ans[ci].frag[fi]=v;if(S.grp){S.grp.answers=S.ans;saveGrp(S.grp);}render();}
function tw(w){
  const ci=S.si;
  if(!S.ans[ci].words)S.ans[ci].words=[];
  const idx=S.ans[ci].words.indexOf(w);
  if(idx>=0)S.ans[ci].words.splice(idx,1);
  else if(S.ans[ci].words.length<3)S.ans[ci].words.push(w);
  if(S.grp){S.grp.answers=S.ans;saveGrp(S.grp);}
  const wc=document.getElementById("wc"),wcc=document.getElementById("wcc");
  if(wc)wc.innerHTML=wcloud(CHARS[ci].words,S.ans[ci].words,CHARS[ci].color,"tw");
  if(wcc)wcc.textContent=`${S.ans[ci].words.length}/3 seleccionados`;
}
function chkAns(ci){
  const an=S.ans[ci],ch=CHARS[ci];
  const d=((an.mc||[]).filter(a=>a!==undefined).length)+((an.tf||[]).filter(a=>a!==undefined).length)+((an.frag||[]).filter(a=>a!==undefined).length);
  return{d,t:ch.mc.length+ch.tf.length+ch.frags.length};
}
function prev(){if(S.si>0){S.si--;render();window.scrollTo(0,0);}}
function nxt(){
  const{d,t}=chkAns(S.si);
  const err=document.getElementById("ne");
  if(d<t){if(err){err.textContent=`Faltan ${t-d} respuesta(s) por completar en esta sección.`;err.style.display="block";}return;}
  if(err)err.style.display="none";
  S.si++;render();window.scrollTo(0,0);
}
async function sub(){
  const{d,t}=chkAns(S.si);
  const err=document.getElementById("ne");
  if(d<t){if(err){err.textContent=`Faltan ${t-d} respuesta(s).`;err.style.display="block";}return;}
  S.grp.completed=true;S.grp.answers=S.ans;S.grp.completedAt=new Date().toISOString();
  await saveGrp(S.grp);S.view="done";render();window.scrollTo(0,0);
}
function chkPin(){
  const v=document.getElementById("pi")?.value||"";
  if(v===PIN){ldDash();}else{const e=document.getElementById("pe");if(e)e.style.display="block";}
}
async function ldDash(){
  S.dgs=await loadGrps();S.view="dash";render();
  if(DB){S.unwatch=watchGrps(gs=>{S.dgs=gs;if(S.view==="dash")render();});}
}
async function refDash(){S.dgs=await loadGrps();render();}
function edTot(){
  const v=prompt("Número total de participantes/grupos esperados:",S.exp);
  if(v&&!isNaN(parseInt(v))){S.exp=parseInt(v);render();}
}
function expCSV(){
  const gs=S.dgs.filter(g=>g.completed);
  if(!gs.length){alert("No hay participantes completados para exportar.");return;}
  const h=["Nombre","Modalidad","Integrantes","Completado","Puntaje total","Porcentaje",
    ...CHARS.map(c=>[`C${c.num} SM (/${c.mc.length})`,`C${c.num} VF (/${c.tf.length})`,`C${c.num} Frag (/${c.frags.length})`,`C${c.num} Total (/${c.mc.length+c.tf.length+c.frags.length})`]).flat(),
    ...CHARS.map(c=>`C${c.num} Palabras`)];
  const rows=gs.map(g=>{
    const s=scTot(g.answers),ss=CHARS.map((c,i)=>scSec(g.answers[i]||{},c));
    return[`"${g.name}"`,g.mode==="individual"?"Individual":"Grupo",`"${(g.members||[]).join(", ")}"`,
      g.completedAt?new Date(g.completedAt).toLocaleString("es-CL"):"",s.t,s.pct+"%",
      ...ss.map(x=>[x.mc,x.tf,x.fr,x.t]).flat(),
      ...CHARS.map((c,i)=>`"${(g.answers[i]?.words||[]).join(", ")}"`)].join(",");
  });
  const csv=[h.join(","),...rows].join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=`iis_bcs_${new Date().toISOString().split("T")[0]}.csv`;
  a.click();URL.revokeObjectURL(url);
}

render();
</script>
</body>
</html>
